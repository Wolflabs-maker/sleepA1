<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOLF LABS: Dream Navigator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (Version 18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Compiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dream: {
                            dark: '#050510',
                            card: '#0a0a1a',
                            border: '#1a1a3a',
                            primary: '#6366f1', // Indigo
                            accent: '#22d3ee'   // Cyan
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dream-dark text-white overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- DATA SOURCE: 25 EXERCISES (A2 LEVEL - SLEEP & NARRATIVES) ---

        const VOCAB_HUNT = [
            { context: "Feeling completely depleted of energy; very tired.", q: "Identify the word:", answer: "Exhausted", options: ["Tired", "Exhausted", "Awake", "Energetic"] },
            { context: "A very bad, terrifying, or frightening dream.", q: "Identify the word:", answer: "Nightmare", options: ["Dream", "Nightmare", "Illusion", "Vision"] },
            { context: "To breathe noisily through your nose and mouth while asleep.", q: "Identify the word:", answer: "Snore", options: ["Whisper", "Snore", "Breathe", "Cough"] },
            { context: "Things you do regularly, especially before going to bed.", q: "Identify the word:", answer: "Habits", options: ["Habits", "Rules", "Dreams", "Games"] },
            { context: "A sequence of images, emotions, and thoughts passing through a sleeping person's mind.", q: "Identify the word:", answer: "Dream", options: ["Dream", "Reality", "Memory", "Nightmare"] }
        ];

        const PAST_SIMPLE_MATRIX = [
            { context: "Completed action in the past.", q: "I ___ a terrible nightmare last night.", answer: "had", options: ["have", "had", "was having", "having"] },
            { context: "A specific finished event.", q: "She ___ up at 6 AM today.", answer: "woke", options: ["wake", "woke", "was waking", "waken"] },
            { context: "A finished habit.", q: "I ___ a glass of warm milk before bed.", answer: "drank", options: ["was drinking", "drink", "drank", "drunk"] },
            { context: "Interrupting action.", q: "The phone ___ while I was sleeping.", answer: "rang", options: ["ring", "was ringing", "rang", "rung"] },
            { context: "A sudden event in a dream.", q: "Suddenly, a monster ___ in front of me.", answer: "appeared", options: ["appears", "was appearing", "appear", "appeared"] }
        ];

        const PAST_CONT_MATRIX = [
            { context: "Background action in progress.", q: "I ___ in the forest when I saw a bear.", answer: "was running", options: ["ran", "run", "was running", "am running"] },
            { context: "Ongoing dream state.", q: "They ___ when the alarm went off.", answer: "were dreaming", options: ["dreamed", "dream", "were dreaming", "are dreaming"] },
            { context: "Setting the scene.", q: "The sun ___ when I finally woke up.", answer: "was shining", options: ["shone", "was shining", "shines", "shine"] },
            { context: "Continuous action before an interruption.", q: "I ___ to music when I had a strange idea.", answer: "was listening", options: ["listened", "was listening", "listen", "am listening"] },
            { context: "Questioning a past state.", q: "What ___ you doing when the nightmare started?", answer: "were", options: ["was", "were", "did", "do"] }
        ];

        const EVIDENCE_LOG = [
            { 
                text: "Last night, I (1) ____ a strange dream. I (2) ____ flying over the city.",
                blanks: [
                    { id: 1, correct: "had", options: ["had", "was having"] },
                    { id: 2, correct: "was", options: ["was", "am"] }
                ]
            },
            { 
                text: "While Neil (1) ____ sleeping, he suddenly (2) ____ a loud noise.",
                blanks: [
                    { id: 1, correct: "was", options: ["was", "were"] },
                    { id: 2, correct: "heard", options: ["heard", "was hearing"] }
                ]
            },
            { 
                text: "Beth usually sleeps 8 hours, but yesterday she (1) ____ late and (2) ____ exhausted.",
                blanks: [
                    { id: 1, correct: "slept", options: ["sleeps", "slept"] },
                    { id: 2, correct: "felt", options: ["felt", "was feeling"] }
                ]
            },
            { 
                text: "I (1) ____ snoring loudly when my alarm suddenly (2) ____.",
                blanks: [
                    { id: 1, correct: "was", options: ["was", "am"] },
                    { id: 2, correct: "rang", options: ["rang", "was ringing"] }
                ]
            },
            { 
                text: "We (1) ____ talking about our dreams when the teacher (2) ____ the room.",
                blanks: [
                    { id: 1, correct: "were", options: ["were", "was"] },
                    { id: 2, correct: "entered", options: ["entered", "entering"] }
                ]
            }
        ];

        const VOCAL_MISSION = [
            { title: "The Sleep Debate", context: "Is 6 hours of sleep enough for a human?", starter: "I think 6 hours isn't enough because when I sleep less, I feel..." },
            { title: "The Nightmare", context: "Describe a scary dream sequence using past continuous.", starter: "In my nightmare, I was running away from a..." },
            { title: "Morning Status", context: "How did you feel when you woke up today?", starter: "When I woke up this morning, I was feeling..." },
            { title: "Weird Dreams", context: "Share an ongoing action in a strange dream.", starter: "In my dream, I was flying over the ocean and then I saw..." },
            { title: "Sleep Habits", context: "What were you doing right before you slept yesterday?", starter: "Right before bed yesterday, I was..." }
        ];

        const LAB_DATA = [
            { id: "ACT-01", title: "Sleep Vocab", icon: "fas fa-moon", description: "Identify terms like exhausted, nightmare, and snore.", tracks: VOCAB_HUNT, type: "decoder" },
            { id: "ACT-02", title: "Simple Actions", icon: "fas fa-check-double", description: "Master completed past actions (Past Simple).", tracks: PAST_SIMPLE_MATRIX, type: "decoder" },
            { id: "ACT-03", title: "Dream States", icon: "fas fa-spinner", description: "Master ongoing background actions (Past Continuous).", tracks: PAST_CONT_MATRIX, type: "decoder" },
            { id: "ACT-04", title: "Dream Audit", icon: "fas fa-clipboard-list", description: "Mix tenses in the narrative evidence log.", tracks: EVIDENCE_LOG, type: "cloze" },
            { id: "ACT-05", title: "Vocal Journal", icon: "fas fa-microphone-alt", description: "Record your dream and sleep habits.", tracks: VOCAL_MISSION, type: "speaking" }
        ];

        // --- MAIN APPLICATION COMPONENT ---

        function App() {
            const [view, setView] = useState('home'); 
            const [activeActIndex, setActiveActIndex] = useState(0);
            const [currentStep, setCurrentStep] = useState(0);
            const [score, setScore] = useState(0);
            
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [clozeSelections, setClozeSelections] = useState({});
            const [isAnswerVerified, setIsAnswerVerified] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });

            const activeActivity = useMemo(() => LAB_DATA[activeActIndex], [activeActIndex]);
            const currentTrack = useMemo(() => activeActivity.tracks[currentStep], [activeActivity, currentStep]);

            const showToast = (msg, type = 'success') => {
                setToast({ show: true, msg, type });
                setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 2500);
            };

            const startExercise = (index) => {
                setActiveActIndex(index);
                setCurrentStep(0);
                resetState();
                setView('exercise');
            };

            const resetState = () => {
                setSelectedAnswer(null);
                setClozeSelections({});
                setIsAnswerVerified(false);
                setIsRecording(false);
                setIsProcessing(false);
            };

            const verifyAnswer = () => {
                if (activeActivity.type === 'decoder') {
                    if (selectedAnswer === currentTrack.answer) {
                        setScore(s => s + 100);
                        showToast("NEURAL LINK ESTABLISHED! +100 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("SYNAPSE ERROR: TRY AGAIN.", 'error');
                    }
                } else if (activeActivity.type === 'cloze') {
                    const isCorrect = currentTrack.blanks.every(b => clozeSelections[b.id] === b.correct);
                    if (isCorrect) {
                        setScore(s => s + 200);
                        showToast("LOG DECRYPTED! +200 XP", 'success');
                        setIsAnswerVerified(true);
                    } else {
                        showToast("NARRATIVE CONFLICT: CHECK BLANKS.", 'error');
                    }
                } else {
                    setIsProcessing(true);
                    setTimeout(() => {
                        setIsProcessing(false);
                        setScore(s => s + 300);
                        showToast("DREAM RECORDED! +300 XP", 'success');
                        setIsAnswerVerified(true);
                    }, 1500);
                }
            };

            const nextStep = () => {
                if (currentStep + 1 < activeActivity.tracks.length) {
                    setCurrentStep(s => s + 1);
                    resetState();
                } else {
                    setView('completion');
                }
            };

            return (
                <div className="min-h-screen font-sans">
                    {/* CYBER-DREAM BACKGROUND */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-indigo-900/20 blur-[150px] rounded-full"></div>
                        <div className="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-cyan-900/10 blur-[150px] rounded-full"></div>
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMSIgY3k9IjEiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=')] opacity-50"></div>
                    </div>

                    <div className="flex h-screen relative z-10">
                        {/* WOLF LABS SIDEBAR */}
                        <aside className="w-72 bg-dream-card border-r border-dream-border flex flex-col justify-between hidden md:flex h-full shadow-[5px_0_30px_rgba(0,0,0,0.5)] z-20">
                            <div>
                                <div className="p-8 border-b border-dream-border">
                                    <h1 className="text-3xl font-black tracking-tighter flex items-center gap-3 text-white">
                                        <i className="fas fa-brain text-dream-primary"></i> WOLF LABS
                                    </h1>
                                    <p className="text-[10px] font-bold text-dream-accent uppercase tracking-[0.2em] mt-2">Language Engineering</p>
                                </div>
                                <nav className="px-4 space-y-2 mt-6 text-left">
                                    <button onClick={() => view !== 'exercise' && setView('home')} className={`w-full flex items-center gap-4 px-4 py-3 font-bold rounded-xl transition-all ${view === 'home' || view === 'completion' ? 'bg-indigo-600/20 text-white border border-indigo-500/30' : 'text-gray-500 hover:text-white hover:bg-white/5'}`}>
                                        <i className={`fas fa-layer-group ${view === 'home' ? "text-dream-primary" : ""}`}></i>
                                        System Hub
                                    </button>
                                    <button className="w-full flex items-center gap-4 px-4 py-3 font-bold text-gray-500 hover:text-white rounded-xl hover:bg-white/5 transition-all">
                                        <i className="fas fa-chart-pie"></i>
                                        Sleep Analytics
                                    </button>
                                </nav>
                            </div>
                            <div className="p-4 border-t border-dream-border">
                                <div className="bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 hover:border-dream-accent/50 transition-all cursor-pointer">
                                    <div className="w-10 h-10 rounded-full bg-dream-primary flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                                        <i className="fas fa-user-astronaut"></i>
                                    </div>
                                    <div className="flex-1 overflow-hidden text-left">
                                        <p className="text-sm font-bold text-white truncate">Subject_A2</p>
                                        <p className="text-[10px] text-dream-accent font-bold uppercase tracking-wider">Dream Walker</p>
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* CONTENT STAGE */}
                        <main className="flex-1 flex flex-col bg-transparent relative overflow-hidden h-full">
                            
                            {/* HUB VIEW */}
                            {view === 'home' && (
                                <div className="flex-1 overflow-y-auto p-8 lg:p-12 animate-in fade-in duration-700">
                                    <header className="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6 text-left">
                                        <div>
                                            <p className="text-dream-accent font-bold tracking-widest uppercase text-xs mb-3 flex items-center gap-2">
                                                <i className="fas fa-satellite-dish animate-pulse"></i> PROTOCOL A2.11 ACTIVE
                                            </p>
                                            <h2 className="text-5xl md:text-6xl font-black tracking-tight text-white mb-4 uppercase drop-shadow-lg">Dream Navigator</h2>
                                            <p className="text-gray-400 text-lg max-w-2xl leading-relaxed">Master the narrative mix of Past Simple and Past Continuous. Reconstruct dream sequences and analyze sleep habits.</p>
                                        </div>
                                        <div className="bg-dream-card border border-dream-border rounded-2xl px-8 py-6 text-center min-w-[180px] shadow-[0_0_30px_rgba(99,102,241,0.15)] relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-dream-primary to-dream-accent"></div>
                                            <p className="text-xs text-gray-500 uppercase tracking-[0.2em] mb-1 font-bold">Neural XP</p>
                                            <p className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-dream-primary to-dream-accent">{score}</p>
                                        </div>
                                    </header>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-6 pb-20">
                                        {LAB_DATA.map((act, idx) => (
                                            <div key={act.id} onClick={() => startExercise(idx)} className="group bg-dream-card border border-dream-border hover:border-dream-primary/50 hover:-translate-y-2 rounded-3xl p-6 transition-all duration-300 cursor-pointer relative overflow-hidden flex flex-col justify-between min-h-[260px]">
                                                <div className="absolute top-[-50px] right-[-50px] w-32 h-32 bg-dream-primary/5 rounded-full blur-2xl group-hover:bg-dream-primary/20 transition-all"></div>
                                                <div className="relative z-10 text-left">
                                                    <div className="w-12 h-12 rounded-2xl bg-indigo-900/30 flex items-center justify-center text-dream-primary group-hover:bg-dream-primary group-hover:text-white mb-6 transition-all text-xl shadow-[0_0_15px_rgba(99,102,241,0)] group-hover:shadow-[0_0_20px_rgba(99,102,241,0.5)]">
                                                        <i className={act.icon}></i>
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2 text-white">{act.title}</h3>
                                                    <p className="text-xs text-gray-400 leading-relaxed">{act.description}</p>
                                                </div>
                                                <div className="flex justify-between items-center text-[9px] font-bold text-gray-500 uppercase tracking-widest border-t border-dream-border pt-4 mt-6">
                                                    <span><i className="fas fa-layer-group mr-1"></i> {act.tracks.length} Stages</span>
                                                    <span className="text-dream-accent">A2 Level</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* EXERCISE VIEW */}
                            {view === 'exercise' && (
                                <div className="flex-1 flex flex-col h-full animate-in fade-in duration-500">
                                    <header className="p-6 border-b border-dream-border bg-dream-card/80 backdrop-blur-md flex items-center justify-between z-20">
                                        <div className="flex items-center gap-6 w-1/3 text-left">
                                            <button onClick={() => setView('home')} className="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:border-dream-primary hover:bg-dream-primary/20 transition-all">
                                                <i className="fas fa-arrow-left"></i>
                                            </button>
                                            <div className="hidden sm:block">
                                                <p className="text-[10px] text-dream-accent uppercase tracking-[0.2em] font-bold">{activeActivity.id}</p>
                                                <p className="font-bold text-sm text-white">{activeActivity.title}</p>
                                            </div>
                                        </div>

                                        <div className="w-1/3 flex flex-col items-center">
                                            <div className="flex justify-between w-full max-w-[250px] text-[10px] text-gray-500 mb-2 font-bold uppercase tracking-widest">
                                                <span>Phase 0{currentStep + 1} / 0{activeActivity.tracks.length}</span>
                                            </div>
                                            <div className="w-full max-w-[250px] h-1.5 bg-white/5 rounded-full overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-dream-primary to-dream-accent transition-all duration-700 ease-out shadow-[0_0_10px_rgba(34,211,238,0.5)]" style={{ width: `${((currentStep + 1) / activeActivity.tracks.length) * 100}%` }}></div>
                                            </div>
                                        </div>

                                        <div className="w-1/3 text-right">
                                            <span className="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">
                                                XP <span className="text-dream-accent ml-1">{score}</span>
                                            </span>
                                        </div>
                                    </header>

                                    <div className="flex-1 overflow-y-auto flex flex-col justify-center p-6 pb-40 relative z-10">
                                        <div className="w-full flex justify-center">
                                            
                                            {/* DECODER (Vocab & Grammar) */}
                                            {activeActivity.type === 'decoder' && (
                                                <div className="w-full max-w-4xl flex flex-col items-center gap-10">
                                                    <div className="flex flex-col md:flex-row gap-6 w-full">
                                                        <div className="flex-1 bg-dream-primary/10 border border-dream-primary/20 rounded-3xl p-8 text-left relative overflow-hidden">
                                                            <div className="absolute top-0 right-0 w-32 h-32 bg-dream-primary/10 rounded-full blur-3xl"></div>
                                                            <p className="text-dream-primary font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-radar"></i> Context Scan</p>
                                                            <h2 className="text-2xl font-medium text-white leading-relaxed">"{currentTrack.context}"</h2>
                                                        </div>
                                                        <div className="flex-1 bg-white/5 border border-white/10 rounded-3xl p-8 text-left">
                                                            <p className="text-gray-400 font-bold text-[10px] uppercase mb-4 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-crosshairs"></i> Target Input</p>
                                                            <h2 className="text-2xl font-medium text-white leading-relaxed italic">
                                                                {currentTrack.q.replace('___', selectedAnswer || '____')}
                                                            </h2>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full">
                                                        {currentTrack.options.map(opt => (
                                                            <button key={opt} onClick={() => !isAnswerVerified && setSelectedAnswer(opt)} className={`p-6 rounded-2xl font-bold uppercase tracking-wider transition-all border-2 text-sm sm:text-base ${selectedAnswer === opt ? 'bg-dream-primary border-dream-primary text-white shadow-[0_0_20px_rgba(99,102,241,0.4)]' : 'bg-dream-card border-dream-border text-gray-400 hover:text-white hover:border-dream-primary/50'}`}>
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}

                                            {/* CLOZE (Evidence Log) */}
                                            {activeActivity.type === 'cloze' && (
                                                <div className="w-full max-w-4xl bg-dream-card border border-dream-border rounded-3xl p-10 shadow-[0_0_50px_rgba(0,0,0,0.5)] text-left relative overflow-hidden">
                                                    <div className="absolute top-0 right-0 w-64 h-64 bg-dream-primary/5 rounded-full blur-3xl"></div>
                                                    <p className="text-dream-primary font-bold text-[10px] uppercase mb-8 tracking-[0.2em] flex items-center gap-2"><i className="fas fa-file-code"></i> Narrative Reconstruction</p>
                                                    <div className="text-2xl sm:text-3xl font-medium leading-[3rem] sm:leading-[4.5rem] text-gray-300">
                                                        {currentTrack.text.split(/(\(\d\)\s____)/).map((part, i) => {
                                                            const match = part.match(/\((\d)\)\s____/);
                                                            if (match) {
                                                                const blankId = parseInt(match[1]);
                                                                const blank = currentTrack.blanks.find(b => b.id === blankId);
                                                                return (
                                                                    <span key={i} className="inline-flex mx-3 relative group">
                                                                        <select value={clozeSelections[blankId] || ""} onChange={(e) => setClozeSelections({...clozeSelections, [blankId]: e.target.value})} disabled={isAnswerVerified} className={`appearance-none bg-black/50 border-b-2 px-4 sm:px-6 py-2 rounded-lg focus:outline-none transition-all font-bold uppercase text-lg sm:text-xl cursor-pointer ${clozeSelections[blankId] ? 'border-dream-accent text-dream-accent bg-dream-accent/10' : 'border-gray-600 text-gray-500 hover:border-gray-400'}`}>
                                                                            <option value="" disabled>---</option>
                                                                            {blank.options.map(o => <option key={o} value={o}>{o}</option>)}
                                                                        </select>
                                                                        <i className="fas fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-xs text-gray-500 pointer-events-none"></i>
                                                                    </span>
                                                                );
                                                            }
                                                            return <span key={i}>{part}</span>;
                                                        })}
                                                    </div>
                                                </div>
                                            )}

                                            {/* SPEAKING */}
                                            {activeActivity.type === 'speaking' && (
                                                <div className="w-full max-w-3xl flex flex-col items-center">
                                                    <div className="w-full bg-dream-card border border-dream-border rounded-3xl p-8 sm:p-12 mb-10 text-center shadow-2xl relative overflow-hidden">
                                                        <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-dream-accent/10 rounded-full blur-3xl"></div>
                                                        <p className="text-[10px] text-dream-accent uppercase font-bold mb-6 tracking-[0.2em] flex items-center justify-center gap-2"><i className="fas fa-wave-square"></i> {currentTrack.title}</p>
                                                        <h2 className="text-2xl sm:text-3xl font-medium text-white mb-10 leading-relaxed text-left">"{currentTrack.context}"</h2>
                                                        <div className="bg-black/40 p-6 sm:p-8 rounded-2xl border border-white/5 text-left w-full border-l-4 border-l-dream-primary">
                                                            <p className="text-[10px] text-gray-500 uppercase font-bold mb-3 tracking-widest">Speaking Starter</p>
                                                            <p className="text-xl sm:text-2xl font-bold text-white italic leading-snug">"{currentTrack.starter}"</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-center gap-6">
                                                        <button onClick={() => !isAnswerVerified && setIsRecording(!isRecording)} className={`w-28 h-28 sm:w-32 sm:h-32 rounded-full flex items-center justify-center transition-all duration-300 ${isRecording ? 'bg-red-500 animate-pulse shadow-[0_0_50px_rgba(239,68,68,0.5)] scale-110' : isAnswerVerified ? 'bg-dream-accent text-dream-dark shadow-[0_0_30px_rgba(34,211,238,0.4)]' : 'bg-dream-card border-2 border-dream-primary text-dream-primary hover:scale-105 hover:bg-dream-primary/10'} text-3xl sm:text-4xl`}>
                                                            {isProcessing ? <i className="fas fa-circle-notch fa-spin"></i> : isAnswerVerified ? <i className="fas fa-check"></i> : <i className="fas fa-microphone"></i>}
                                                        </button>
                                                        <p className={`text-[10px] sm:text-xs font-bold tracking-[0.2em] uppercase ${isRecording ? 'text-red-400' : 'text-gray-500'}`}>{isRecording ? 'Recording Neural Wave...' : isProcessing ? 'Analyzing Syntax...' : isAnswerVerified ? 'Signal Locked' : 'Hold to Transmit'}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* ACTION FOOTER */}
                                    <div className="absolute bottom-0 w-full p-6 sm:p-8 bg-gradient-to-t from-[#050510] via-[#050510] to-transparent flex justify-center pb-8 sm:pb-12 z-40">
                                        {!isAnswerVerified ? (
                                            <button onClick={verifyAnswer} disabled={(!selectedAnswer && Object.keys(clozeSelections).length === 0 && !isRecording) || isProcessing} className="w-full max-w-lg py-4 sm:py-5 rounded-full bg-dream-primary text-white font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-indigo-500 disabled:opacity-30 disabled:hover:bg-dream-primary shadow-[0_10px_30px_rgba(99,102,241,0.2)] hover:scale-[1.02] hover:shadow-[0_10px_40px_rgba(99,102,241,0.4)]">
                                                Verify Sequence <i className="fas fa-shield-alt"></i>
                                            </button>
                                        ) : (
                                            <button onClick={nextStep} className="w-full max-w-lg py-4 sm:py-5 rounded-full bg-dream-accent text-dream-dark font-black uppercase tracking-[0.2em] text-sm sm:text-base flex items-center justify-center gap-3 transition-all hover:bg-cyan-300 hover:scale-[1.02] shadow-[0_10px_30px_rgba(34,211,238,0.3)]">
                                                Next Sequence <i className="fas fa-forward"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* FINAL RESULTS VIEW */}
                            {view === 'completion' && (
                                <div className="flex-1 flex flex-col items-center justify-center relative p-6 text-center animate-in zoom-in-95 duration-700">
                                    <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(99,102,241,0.15)_0%,transparent_70%)] pointer-events-none"></div>
                                    <div className="relative z-10 max-w-2xl w-full">
                                        <div className="w-24 h-24 sm:w-32 sm:h-32 mx-auto rounded-full bg-dream-primary/20 border-4 border-dream-primary flex items-center justify-center mb-8 sm:mb-10 shadow-[0_0_50px_rgba(99,102,241,0.5)] text-4xl sm:text-6xl text-dream-accent">
                                            <i className="fas fa-award"></i>
                                        </div>
                                        <h1 className="text-4xl sm:text-6xl font-black mb-4 sm:mb-6 tracking-tighter uppercase text-white drop-shadow-lg">Mastery Achieved</h1>
                                        <p className="text-lg sm:text-2xl text-gray-400 mb-10 sm:mb-12 max-w-xl mx-auto leading-relaxed">System Status: Optimized. Past narrative structures and sleep vocabulary successfully integrated.</p>
                                        <div className="bg-dream-card border border-dream-border rounded-3xl p-8 sm:p-10 mb-10 sm:mb-12 flex justify-around shadow-2xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-dream-primary"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Total Neural XP</p>
                                                <p className="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-dream-primary to-dream-accent">+{score}</p>
                                            </div>
                                            <div className="w-px bg-dream-border"></div>
                                            <div className="text-center">
                                                <p className="text-[10px] sm:text-xs text-gray-500 uppercase tracking-[0.2em] mb-2 sm:mb-3 font-bold">Fluency Lock</p>
                                                <p className="text-4xl sm:text-5xl font-black text-white">A2.11</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setView('home')} className="w-full sm:w-auto px-12 py-5 sm:py-6 rounded-full bg-white/5 text-white font-black uppercase tracking-[0.2em] text-sm sm:text-base hover:bg-white hover:text-dream-dark transition-all border border-white/10 hover:shadow-[0_0_30px_rgba(255,255,255,0.3)]">Return to Hub</button>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* SYSTEM TOASTS */}
                    <div className={`fixed top-8 left-1/2 transform -translate-x-1/2 px-6 sm:px-10 py-4 sm:py-5 rounded-2xl sm:rounded-3xl font-bold shadow-[0_10px_40px_rgba(0,0,0,0.5)] transition-all duration-300 z-[100] flex items-center gap-3 sm:gap-4 border ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-10 pointer-events-none'} ${toast.type === 'success' ? 'bg-dream-card text-white border-dream-primary' : 'bg-red-900 text-white border-red-500'}`}>
                        {toast.type === 'success' ? <i className="fas fa-check-circle text-dream-accent text-xl sm:text-2xl"></i> : <i className="fas fa-exclamation-triangle text-red-400 text-xl sm:text-2xl"></i>}
                        <span className="text-sm sm:text-lg uppercase tracking-[0.1em] sm:tracking-widest font-black">{toast.msg}</span>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
